name: 🌍 国际热点新闻推送

on:
  schedule:
    # 北京时间 06:00 = UTC 22:00（前一天）
    - cron: "0 22 * * *"
    # 北京时间 12:00 = UTC 04:00
    - cron: "0 4 * * *"
    # 北京时间 20:00 = UTC 12:00
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      session:
        description: "推送时段（不选则自动检测）"
        type: choice
        options:
          - auto
          - morning
          - noon
          - evening
        default: auto
        required: false

jobs:
  push-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔄 同步已推送记录
        run: |
          git pull origin main --depth=1 2>/dev/null || true

      - name: 🐍 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 执行新闻推送
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
          WECHAT_OPENID: ${{ secrets.WECHAT_OPENID }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SESSION="${{ github.event.inputs.session }}"
            if [ "$SESSION" = "auto" ]; then
              python -m src.main
            else
              python -m src.main --session "$SESSION"
            fi
          else
            HOUR_UTC=$(date +%H)
            if [ "$HOUR_UTC" -ge 20 ] || [ "$HOUR_UTC" -lt 2 ]; then
              python -m src.main --session morning
            elif [ "$HOUR_UTC" -ge 2 ] && [ "$HOUR_UTC" -lt 9 ]; then
              python -m src.main --session noon
            else
              python -m src.main --session evening
            fi
          fi

      - name: 💾 提交更新
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/sent_news.json data/hotness_history.json docs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "📝 无新记录需要提交"
          else
            git commit -m "📝 更新已推送记录 [skip ci]"
            git push origin main
            echo "✅ 已推送记录已更新"
          fi
